name: Test UV Python version

on:
  pull_request:
    paths-ignore:
      - "manifests/**"

jobs:
  test-uv:
    runs-on: ubuntu-latest
    steps:
      # Here we are checking out the pull request, so that we can build from the new code
      # We can do this because we already checked that the submitting user is a contributor
      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"
      - uses: actions/checkout@v6
        if: ${{ github.event_name != 'pull_request_target' }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"

      - name: Check uv is installed correctly
        run: uv version

      - name: Show UV_PYTHON and Python info
        run: |
          which python3
          python3 --version
