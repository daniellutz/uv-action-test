name: Test UV Python version

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-uv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.14"

      - name: Check uv is installed correctly
        run: uv version

      - name: Show UV_PYTHON and Python info
        run: |
          which python3
          python3 --version
